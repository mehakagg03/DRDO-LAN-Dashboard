<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interns Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" alt="Logo" class="logo">

  <div class="title-group">
    <h1>SSPL DRDO</h1>
    <p>HR DATA DASHBOARD</p>
  </div>

  <div></div> 
</div>

<div class="card upload-card">
  <h3>Upload Dataset</h3>

  <label for="fileInput" class="file-label">
    Choose File
  </label>
  <input type="file" id="fileInput" accept=".csv" hidden>

</div>

<!-- STEP 2: TABLE PREVIEW -->
<div id="tableSection" class="container hidden">
  <div class="card table-card">
    <h3>Dataset Preview</h3>
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- STEP 3: BUTTON -->
<div id="dashboardBtnContainer" class="container hidden">
  <button id="viewDashboardBtn" class="view-btn">View Dashboard</button>
</div>

<!-- STEP 4: DASHBOARD -->
<div id="dashboard" class="hidden">

  <!-- KPI -->
  <div class="container">
    <div class="card kpi">
      <h3>Total Interns</h3>
      <p id="total">0</p>
    </div>

    <div class="card kpi">
      <h3>Male</h3>
      <p id="male">0</p>
    </div>

    <div class="card kpi">
      <h3>Female</h3>
      <p id="female">0</p>
    </div>
  </div>

  <!-- FILTER -->
  <div class="container filter">
    <div class="card">
      <select id="yearFilter">
        <option value="all">All Years</option>
      </select>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-container">
    <div class="card chart"><h3>State</h3><canvas id="stateChart"></canvas></div>
    <div class="card chart"><h3>Affiliation</h3><canvas id="collegeChart"></canvas></div>
    <div class="card chart"><h3>Mentor</h3><canvas id="profChart"></canvas></div>
    <div class="card chart"><h3>Department</h3><canvas id="departmentChart"></canvas></div>
    <div class="card chart"><h3>Domain</h3><canvas id="domainChart"></canvas></div>
    <div class="card chart"><h3>Duration</h3><canvas id="durationChart"></canvas></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
